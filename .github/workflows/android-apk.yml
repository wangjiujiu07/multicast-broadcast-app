name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool libtool-bin m4 pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libc6-dev libffi-dev libssl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Cython==0.29.36" "buildozer==1.5.0" "python-for-android==2024.1.21"

      - name: Prepare Android SDK components
        env:
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          set -o pipefail
          buildozer android update
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found under $ANDROID_SDK_ROOT"
            find "$ANDROID_SDK_ROOT" -maxdepth 4 -type f -name sdkmanager || true
            exit 1
          fi
          yes | "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;34.0.0"
          ls -la "$ANDROID_SDK_ROOT/build-tools"

      - name: Build debug APK
        env:
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer.log

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: |
            buildozer.log
            .buildozer/**/*.log
          if-no-files-found: warn

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: multicast-broadcast-apk
          path: bin/*.apk
          if-no-files-found: error
